apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: snapsentry

patches:
  - target:
      kind: CronJob
      name: snapsentry-orchestrator
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/args
        value:
          - admin
          - orchestrator
          - --incluster
          - --log-level
          - info
          - --cloud
          - snapsentry-orchestartor
          - --workload-snapsentry-image
          - ghcr.io/aravindh-murugesan/openstack-snapsentry-go:sha-1c731af

secretGenerator:
  - name: snapsentry-orchestartor-creds
    files:
      - clouds.yaml
